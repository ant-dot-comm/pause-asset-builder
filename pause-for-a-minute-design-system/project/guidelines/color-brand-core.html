<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg-base);color:var(--text-body);font-family:var(--font-body);
       padding:22px;min-height:150px;}
  .lbl{font-family:var(--font-meta);font-size:11px;letter-spacing:var(--ls-label);text-transform:uppercase;color:var(--text-muted);}
  .mono{font-family:var(--font-meta);font-size:11px;color:var(--text-faint);}
  
</style></head><body>
<div style="display:flex;gap:14px">
  <div style="display:flex;flex-direction:column;gap:7px;flex:1;min-width:120px">
  <div style="height:64px;border-radius:12px;background:#1c1c1c;border:1px solid var(--line)"></div>
  <div style="font-family:var(--font-meta);font-size:12.5px;color:var(--text-strong);font-weight:600">Near Black</div>
  <div class="mono">#1c1c1c</div>
  <div class="mono" style="color:var(--text-muted)">--ink-800</div>
</div>
  <div style="display:flex;flex-direction:column;gap:7px;flex:1;min-width:120px">
  <div style="height:64px;border-radius:12px;background:#7e44b4;border:1px solid var(--line)"></div>
  <div style="font-family:var(--font-meta);font-size:12.5px;color:var(--text-strong);font-weight:600">Pause Purple</div>
  <div class="mono">#7e44b4</div>
  <div class="mono" style="color:var(--text-muted)">--plum-500</div>
</div>
  <div style="display:flex;flex-direction:column;gap:7px;flex:1;min-width:120px">
  <div style="height:64px;border-radius:12px;background:#f4eee2;border:1px solid var(--line)"></div>
  <div style="font-family:var(--font-meta);font-size:12.5px;color:var(--text-strong);font-weight:600">Ivory</div>
  <div class="mono">#f4eee2</div>
  <div class="mono" style="color:var(--text-muted)">--ivory-50</div>
</div>
</div>
</body></html>
