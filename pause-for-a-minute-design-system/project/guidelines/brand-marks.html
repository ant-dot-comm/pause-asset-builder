<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box} html,body{margin:0}
  body{background:var(--ink-800);color:var(--text-body);font-family:var(--font-body);padding:22px;min-height:200px;}
  .lbl{font-family:var(--font-meta);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-muted);}
  .mono{font-family:var(--font-meta);font-size:11px;color:var(--text-faint);}
  
</style></head><body>
<div style="display:flex;gap:18px;align-items:center;justify-content:space-around">
  <div style="text-align:center;color:var(--accent-soft)"><img src="../assets/logos/pause-mark.svg" style="height:96px;color:var(--ivory-50)"><div class="lbl" style="margin-top:8px">Icon mark</div></div>
  <div style="text-align:center;color:var(--ivory-50)"><img src="../assets/logos/clock-arc.svg" style="height:70px"><div class="lbl" style="margin-top:8px">Clock arc</div></div>
  <div style="text-align:center;color:var(--accent)"><img src="../assets/logos/pause-bars.svg" style="height:74px"><div class="lbl" style="margin-top:8px;color:var(--text-muted)">Pause bars</div></div>
</div></body></html>
