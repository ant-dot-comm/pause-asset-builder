<!-- @dsCard group="Colors" viewport="700x190" name="Text on Dark" subtitle="Warm ivory text ladder" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg-base);color:var(--text-body);font-family:var(--font-body);
       padding:22px;min-height:190px;}
  .lbl{font-family:var(--font-meta);font-size:11px;letter-spacing:var(--ls-label);text-transform:uppercase;color:var(--text-muted);}
  .mono{font-family:var(--font-meta);font-size:11px;color:var(--text-faint);}
  
</style></head><body>
<div style="display:flex;flex-direction:column;gap:12px">
  <div style="font-family:var(--font-body);font-size:22px;color:var(--text-strong);font-weight:600">Strong — headlines &amp; PAUSE <span class="mono" style="color:var(--text-muted)">--text-strong #f4eee2</span></div>
  <div style="font-family:var(--font-body);font-size:18px;color:var(--text-body)">Body — the warm reading tone for paragraphs <span class="mono" style="color:var(--text-muted)">--text-body</span></div>
  <div style="font-family:var(--font-body);font-size:15px;color:var(--text-muted)">Muted — captions, metadata, timestamps <span class="mono">--text-muted</span></div>
  <div style="font-family:var(--font-body);font-size:13px;color:var(--text-faint)">Faint — disabled, hairline labels <span class="mono">--text-faint</span></div>
</div>
</body></html>
