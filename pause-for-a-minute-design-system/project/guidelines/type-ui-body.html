<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg-base);color:var(--text-body);font-family:var(--font-body);
       padding:22px;min-height:210px;}
  .lbl{font-family:var(--font-meta);font-size:11px;letter-spacing:var(--ls-label);text-transform:uppercase;color:var(--text-muted);}
  .mono{font-family:var(--font-meta);font-size:11px;color:var(--text-faint);}
  
</style></head><body>
<div style="font-family:var(--font-body);font-size:17px;color:var(--text-body);max-width:54ch;line-height:1.62">Every now and then, even the busiest mind needs a moment to pause. We sit with hustlers, doers, movers and shakers and trace the tapestry of life, culture, and ambition.</div>
<div style="display:flex;gap:18px;margin-top:16px;align-items:baseline">
  <span style="font-family:var(--font-body);font-weight:600;font-size:15px;color:var(--text-strong)">Semibold 600</span>
  <span style="font-family:var(--font-body);font-weight:500;font-size:15px;color:var(--text-body)">Medium 500</span>
  <span style="font-family:var(--font-body);font-weight:400;font-size:15px;color:var(--text-muted)">Regular 400</span>
</div>
<div class="lbl" style="margin-top:14px">Hanken Grotesk · body, UI, metadata · --font-body</div>
</body></html>
