<!-- @dsCard group="Spacing" viewport="700x180" name="Shadows" subtitle="Soft, warm, matte — no glow" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box} html,body{margin:0}
  body{background:var(--bg-base);color:var(--text-body);font-family:var(--font-body);padding:22px;min-height:180px;}
  .lbl{font-family:var(--font-meta);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-muted);}
  .mono{font-family:var(--font-meta);font-size:11px;color:var(--text-faint);}
  
</style></head><body>
<div style="display:flex;gap:22px;flex-wrap:wrap">
  <div style="flex:1;min-width:120px;height:80px;background:var(--surface-raised);border-radius:16px;box-shadow:var(--shadow-sm);display:flex;align-items:flex-end;padding:10px"><span class="mono">--shadow-sm</span></div>
  <div style="flex:1;min-width:120px;height:80px;background:var(--surface-raised);border-radius:16px;box-shadow:var(--shadow-md);display:flex;align-items:flex-end;padding:10px"><span class="mono">--shadow-md</span></div>
  <div style="flex:1;min-width:120px;height:80px;background:var(--surface-raised);border-radius:16px;box-shadow:var(--shadow-lg);display:flex;align-items:flex-end;padding:10px"><span class="mono">--shadow-lg</span></div>
</div></body></html>
