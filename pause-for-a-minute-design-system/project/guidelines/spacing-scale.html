<!-- @dsCard group="Spacing" viewport="700x230" name="Spacing Scale" subtitle="4px base — generous, breathing room" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box} html,body{margin:0}
  body{background:var(--bg-base);color:var(--text-body);font-family:var(--font-body);padding:22px;min-height:230px;}
  .lbl{font-family:var(--font-meta);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-muted);}
  .mono{font-family:var(--font-meta);font-size:11px;color:var(--text-faint);}
  
</style></head><body>
<div style="display:flex;flex-direction:column;gap:9px">
  <div style="display:flex;align-items:center;gap:14px">
  <div style="width:96px" class="mono">--space-1</div>
  <div style="height:14px;width:4px;background:var(--accent);border-radius:3px"></div>
  <div class="mono">4px</div></div><div style="display:flex;align-items:center;gap:14px">
  <div style="width:96px" class="mono">--space-2</div>
  <div style="height:14px;width:8px;background:var(--accent);border-radius:3px"></div>
  <div class="mono">8px</div></div><div style="display:flex;align-items:center;gap:14px">
  <div style="width:96px" class="mono">--space-3</div>
  <div style="height:14px;width:12px;background:var(--accent);border-radius:3px"></div>
  <div class="mono">12px</div></div><div style="display:flex;align-items:center;gap:14px">
  <div style="width:96px" class="mono">--space-4</div>
  <div style="height:14px;width:16px;background:var(--accent);border-radius:3px"></div>
  <div class="mono">16px</div></div>
  <div style="display:flex;align-items:center;gap:14px">
  <div style="width:96px" class="mono">--space-5</div>
  <div style="height:14px;width:24px;background:var(--accent);border-radius:3px"></div>
  <div class="mono">24px</div></div><div style="display:flex;align-items:center;gap:14px">
  <div style="width:96px" class="mono">--space-6</div>
  <div style="height:14px;width:32px;background:var(--accent);border-radius:3px"></div>
  <div class="mono">32px</div></div><div style="display:flex;align-items:center;gap:14px">
  <div style="width:96px" class="mono">--space-7</div>
  <div style="height:14px;width:48px;background:var(--accent);border-radius:3px"></div>
  <div class="mono">48px</div></div><div style="display:flex;align-items:center;gap:14px">
  <div style="width:96px" class="mono">--space-8</div>
  <div style="height:14px;width:64px;background:var(--accent);border-radius:3px"></div>
  <div class="mono">64px</div></div>
</div></body></html>
