<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box} html,body{margin:0}
  body{background:var(--ink-800);color:var(--text-body);font-family:var(--font-body);padding:22px;min-height:230px;}
  .lbl{font-family:var(--font-meta);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-muted);}
  .mono{font-family:var(--font-meta);font-size:11px;color:var(--text-faint);}
  
</style></head><body>
<div style="display:flex;gap:30px;align-items:center;flex-wrap:wrap">
  <div style="position:relative;padding:34px;border:1px dashed var(--line-strong);border-radius:14px">
    <img src="../assets/logos/pause-logo-ivory.svg" style="height:96px;display:block">
    <span class="mono" style="position:absolute;top:8px;left:12px">clear space ≥ 1×P height</span>
  </div>
  <div style="display:flex;flex-direction:column;gap:14px;align-items:center">
    <img src="../assets/logos/pause-logo-ivory.svg" style="height:44px">
    <span class="mono">min digital · 120px wide / 44px tall</span>
    <img src="../assets/logos/pause-mark.svg" style="height:30px;color:var(--ivory-50)">
    <span class="mono">icon min · 24px</span>
  </div>
</div></body></html>
