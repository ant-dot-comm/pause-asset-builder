<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg-base);color:var(--text-body);font-family:var(--font-body);
       padding:22px;min-height:150px;}
  .lbl{font-family:var(--font-meta);font-size:11px;letter-spacing:var(--ls-label);text-transform:uppercase;color:var(--text-muted);}
  .mono{font-family:var(--font-meta);font-size:11px;color:var(--text-faint);}
  
</style></head><body>
<div style="display:flex;flex-direction:column;gap:14px">
  <span class="lbl" style="color:var(--accent-soft);font-size:12px">Episode 47 · Season 3</span>
  <span class="lbl" style="color:var(--text-muted);font-size:12px">New Episode · Every Tuesday</span>
  <span style="font-family:var(--font-meta);font-size:12px;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent-warm)">Pause Prompt</span>
</div>
</body></html>
