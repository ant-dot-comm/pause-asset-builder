<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg-base);color:var(--text-body);font-family:var(--font-body);
       padding:22px;min-height:150px;}
  .lbl{font-family:var(--font-meta);font-size:11px;letter-spacing:var(--ls-label);text-transform:uppercase;color:var(--text-muted);}
  .mono{font-family:var(--font-meta);font-size:11px;color:var(--text-faint);}
  
</style></head><body>
<div style="display:flex;gap:12px">
  <div style="display:flex;flex-direction:column;gap:7px;flex:1;min-width:120px">
  <div style="height:64px;border-radius:12px;background:#141414;border:1px solid var(--line)"></div>
  <div style="font-family:var(--font-meta);font-size:12.5px;color:var(--text-strong);font-weight:600">Bg Deep</div>
  <div class="mono">#141414</div>
  <div class="mono" style="color:var(--text-muted)">--bg-deep</div>
</div>
  <div style="display:flex;flex-direction:column;gap:7px;flex:1;min-width:120px">
  <div style="height:64px;border-radius:12px;background:#1c1c1c;border:1px solid var(--line)"></div>
  <div style="font-family:var(--font-meta);font-size:12.5px;color:var(--text-strong);font-weight:600">Bg Base</div>
  <div class="mono">#1c1c1c</div>
  <div class="mono" style="color:var(--text-muted)">--bg-base</div>
</div>
  <div style="display:flex;flex-direction:column;gap:7px;flex:1;min-width:120px">
  <div style="height:64px;border-radius:12px;background:#262226;border:1px solid var(--line)"></div>
  <div style="font-family:var(--font-meta);font-size:12.5px;color:var(--text-strong);font-weight:600">Surface 1</div>
  <div class="mono">#262226</div>
  <div class="mono" style="color:var(--text-muted)">--surface-1</div>
</div>
  <div style="display:flex;flex-direction:column;gap:7px;flex:1;min-width:120px">
  <div style="height:64px;border-radius:12px;background:#211829;border:1px solid var(--line)"></div>
  <div style="font-family:var(--font-meta);font-size:12.5px;color:var(--text-strong);font-weight:600">Surface 2</div>
  <div class="mono">#211829</div>
  <div class="mono" style="color:var(--text-muted)">--surface-2</div>
</div>
  <div style="display:flex;flex-direction:column;gap:7px;flex:1;min-width:120px">
  <div style="height:64px;border-radius:12px;background:#2c2730;border:1px solid var(--line)"></div>
  <div style="font-family:var(--font-meta);font-size:12.5px;color:var(--text-strong);font-weight:600">Raised</div>
  <div class="mono">#2c2730</div>
  <div class="mono" style="color:var(--text-muted)">--surface-raised</div>
</div>
</div>
</body></html>
