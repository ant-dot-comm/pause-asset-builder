<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Episode Cover" description="Square 1080×1080 episode cover — guest portrait, episode number, title and guest name." -->
<helmet>
  <script src="./ds-base.js"></script>
  <style>
    @media print { @page { size: auto; margin: 0; } }
  </style>
</helmet>
<div style="width:1080px;height:1080px;background:#18121f;display:flex;overflow:hidden;font-family:'Hanken Grotesk',system-ui,sans-serif;position:relative">
  <div style="width:46%;position:relative;background:linear-gradient(135deg,#2a1d38 0%,#4a2c63 60%,#1c1c1c 100%);display:flex;align-items:center;justify-content:center">
    <div style="position:absolute;inset:0;background-image:radial-gradient(rgba(244,238,226,0.06) 1px,transparent 1px);background-size:5px 5px;mix-blend-mode:overlay"></div>
    <span style="font-size:13px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(244,238,226,0.4)">Guest Portrait</span>
  </div>
  <div style="flex:1;padding:72px 64px;display:flex;flex-direction:column;justify-content:space-between">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <img src="../../assets/logos/pause-mark-purple.svg" style="width:92px" alt="mark">
      <span style="font-size:22px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:#b59cd0;border:2px solid #4a2c63;border-radius:999px;padding:8px 20px">EP 47</span>
    </div>
    <div>
      <span style="display:inline-flex;align-items:center;gap:14px;font-size:20px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:#cf8a3e">
        <span style="width:32px;height:2px;background:currentColor"></span>Season 3
      </span>
      <h1 style="font-family:'Newsreader',Georgia,serif;font-weight:500;font-size:78px;line-height:1.08;color:#f4eee2;margin:22px 0 28px">The Discipline Behind the Drift</h1>
      <p style="font-family:'Newsreader',Georgia,serif;font-style:italic;font-size:36px;color:#b59cd0;margin:0">with Maya Okonkwo</p>
    </div>
    <p style="font-size:26px;line-height:1.5;color:#9a9088;margin:0;max-width:90%">On craft, doubt, and the quiet work of showing up before the world is watching.</p>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1080,&quot;height&quot;:1080}}"></script>
</body>
</html>
